<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Excel file upload</title>
    <!-- external CSS -->
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/home.css">
</head>
<body>
    
    <div class="home-container">
        <div id="left">
            <div class="text-group">
                <div class="title">SASE Score</div>
                <div class="subtitle">Prediction System</div>
            </div>
            <div class="text">Please select your strand.</div>
        </div>

        <div id="right">
            <div class="strand-btns">
                
                <div class="strand-btn" data-strand="stem">
                    STEM
                </div>
                <div class="strand-btn" data-strand="tvl">
                    TVL
                </div>
                <div class="strand-btn" data-strand="humms">
                    HUMMS
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
